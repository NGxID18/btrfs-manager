<!DOCTYPE html>
<html>
<head>
    <title>BTRFS Manager</title>
    <meta charset="utf-8">
    <link href="../base1/cockpit.css" type="text/css" rel="stylesheet">
    <link href="style.css" type="text/css" rel="stylesheet">
    <script src="../base1/cockpit.js"></script>
    <script src="app.js" defer></script>
</head>
<body>
    <h2>Native BTRFS Management</h2>
    <p>Manage volumes, RAID topologies, subvolumes, and snapshots.</p>
    
    <hr class="btrfs-divider">

    <div class="action-buttons">
        <button class="btn btn-primary" id="btn-create-raid">Create New RAID Volume</button>
        <button class="btn btn-secondary" id="btn-refresh">Refresh Data</button>
    </div>

    <div id="raid-form" class="btrfs-card raid-form-card hidden-element">
        <h3>🛠 Create New BTRFS Volume</h3>
        
        <div class="form-group">
            <p><b>1. Select Target Disks:</b></p>
            <div id="available-disks" class="available-disks-box">Scanning block devices...</div>
        </div>

        <div class="form-group">
            <p><b>2. Volume Configuration:</b></p>
            <label for="raid-profile" class="form-label">Data Profile:</label>
            <select id="raid-profile" class="form-input">
                <option value="single">Single (1 Disk)</option>
                <option value="raid1">RAID 1 (Mirror - Min 2 Disks)</option>
                <option value="raid0">RAID 0 (Stripe - Min 2 Disks)</option>
                <option value="raid10">RAID 10 (Stripe+Mirror - Min 4 Disks)</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="volume-label" class="form-label">Volume Label:</label>
            <input type="text" id="volume-label" class="form-input" placeholder="e.g., DataServer">
        </div>
        
        <div class="form-group">
            <button class="btn btn-primary" id="btn-execute-format">⚡ Format & Create Volume</button>
            <button class="btn btn-secondary" id="btn-cancel-format">Cancel</button>
        </div>
        
        <p id="format-status" class="btrfs-code hidden-element"></p>
    </div>

    <div id="disk-container">
        <p>Loading system data...</p>
    </div>
</body>
</html>
